<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — CaloriQ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">CaloriQ</a>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="tracker.html">Food Tracker</a>
    <a href="planner.html">Goal Planner</a>
    <a href="progress.html">Progress</a>
  </div>
  <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="dashboard.html">Dashboard</a>
  <a href="tracker.html">Food Tracker</a>
  <a href="planner.html">Goal Planner</a>
  <a href="progress.html">Progress</a>
</div>

<div class="auth-wrap">
  <h1>Create your account</h1>
  <p class="sub">Start tracking your health journey today.</p>

  <div class="card">
    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label>Full name</label>
      <input type="text" id="name" placeholder="Your name" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Your email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters" />
    </div>
    <button class="btn btn-green btn-full" onclick="signUp()">Create account</button>
  </div>

  <div class="auth-switch">Already have an account? <a href="login.html">Log in</a></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { FIREBASE_CONFIG } from "./firebase-config.js";

  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.signUp = async function () {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('errorMsg');
    errEl.style.display = 'none';

    if (!name || !email || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.style.display = 'block';
      return;
    }

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db, 'users', cred.user.uid), { name, email, createdAt: Date.now() });
      window.location.href = 'profile-setup.html';
    } catch (e) {
      errEl.textContent = e.message.replace('Firebase: ', '');
      errEl.style.display = 'block';
    }
  };
</script>
<script>
  function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('open'); }
</script>
</body>
</html>
